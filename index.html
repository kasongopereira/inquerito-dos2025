<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Telecomando Samsung — Réplica</title>
  <style>
    :root{
      --bg:#0a0f18;--case1:#0f1726;--case2:#0b1324;--ink:#eef3ff;--muted:#a7b3cc;--edge:#182545;--btn:#1b2745;--btn2:#0f1833;--btnText:#e9eeff;--accent:#ff4d4f;--brand:#c9d3ea
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;display:grid;place-items:center;background:radial-gradient(1200px 800px at 20% -10%, #132757, #0a0f18);color:var(--ink);font:15px/1.5 system-ui,Segoe UI,Roboto,Arial}

    .phone{width:min(380px,95vw);padding:18px}

    .remote{position:relative;margin:auto;background:linear-gradient(170deg,var(--case1),var(--case2));border:1px solid var(--edge);border-radius:34px;padding:16px 14px 24px;box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 -10px 28px rgba(255,255,255,.05);overflow:hidden}

    .top-row,.row{display:grid;grid-auto-flow:column;gap:10px;justify-content:center;align-items:center}
    .top-row{grid-template-columns:1fr 1fr}

    .face{display:grid;gap:10px}
    .grid-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

    .btn{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;-webkit-touch-callout:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:grid;place-items:center;height:48px;border-radius:12px;border:1px solid #2b3c66;background:linear-gradient(180deg,#243963,#1a2a4a);color:var(--btnText);font-weight:800;letter-spacing:.3px;text-shadow:0 1px 0 rgba(0,0,0,.35);box-shadow:0 10px 24px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.08);cursor:pointer;transition:.1s transform,.1s filter,.1s box-shadow}
    .btn:active{transform:translateY(1px) scale(.98);filter:brightness(.95)}
    .btn.is-pressed{transform:translateY(2px) scale(.96);filter:brightness(.9);box-shadow:inset 0 8px 18px rgba(0,0,0,.45), 0 6px 12px rgba(0,0,0,.25)}

    .btn--circle{border-radius:50%;height:56px;width:56px}
    .btn--small{height:42px;font-size:13px}
    .btn--flat{background:#101a33;border-color:#243456}

    .btn--power{background:#ef4444;border-color:#7a2222;color:#fff}
    .btn--source{font-weight:900}

    .dpad-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
    .col{display:grid;gap:8px}
    .dpad{display:grid;grid-template-columns:60px 60px 60px;gap:8px;justify-content:center}
    .dpad .sp{visibility:hidden}
    .btn--ok{background:#2a66ff;border-color:#143b9b}

    .apps{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .app--nf{background:#ffffff;color:#e50914;border-color:#8f0916;font-weight:900}
    .app--rk{background:#ffffff;color:#c21b2f;border-color:#8e0d1f;font-weight:800}
    .app--pv{background:#ffffff;color:#2b7cff;border-color:#1e4ea6;font-weight:800}

    .colors{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .cA{background:#ff4d4f;color:#fff;border-color:#7a2222}
    .cB{background:#2ecc71;color:#fff;border-color:#1b6a3d}
    .cC{background:#f1c40f;color:#000;border-color:#7a6617}
    .cD{background:#3498db;color:#fff;border-color:#1e5f8f}

    .brand{margin-top:10px;display:grid;place-items:center;color:var(--brand);letter-spacing:3px;font-weight:900;opacity:.9}

    .subtle{color:var(--muted);font-size:12px;text-align:center;margin-top:6px}

    /* Fit everything inside the shell */
    @media (max-width:360px){
      .btn{height:44px}
      .btn--circle{height:52px;width:52px}
      .dpad{grid-template-columns:56px 56px 56px}
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="remote" id="remote">
      <div class="top-row">
        <div class="btn btn--circle btn--power" data-key="POWER">⏻</div>
        <div class="btn btn--small btn--flat btn--source" data-key="SOURCE">SOURCE</div>
      </div>

      <div class="face">
        <!-- Números -->
        <div class="grid-nums">
          <div class="btn" data-key="1">1</div>
          <div class="btn" data-key="2">2</div>
          <div class="btn" data-key="3">3</div>
          <div class="btn" data-key="4">4</div>
          <div class="btn" data-key="5">5</div>
          <div class="btn" data-key="6">6</div>
          <div class="btn" data-key="7">7</div>
          <div class="btn" data-key="8">8</div>
          <div class="btn" data-key="9">9</div>
          <div class="btn btn--small btn--flat" data-key="TTX_MIX">TTX/MIX</div>
          <div class="btn" data-key="0">0</div>
          <div class="btn btn--small btn--flat" data-key="PRE_CH">PRE-CH</div>
        </div>

        <!-- MUTE / VOL / HOME / CH / CH LIST -->
        <div class="dpad-wrap">
          <div class="col">
            <div class="btn btn--small btn--flat" data-key="MUTE">MUTE</div>
            <div class="btn" data-key="VOL_UP">VOL +</div>
            <div class="btn" data-key="VOL_DOWN">VOL −</div>
          </div>

          <div class="dpad">
            <div class="sp"></div>
            <div class="btn" data-key="UP">▲</div>
            <div class="sp"></div>
            <div class="btn" data-key="LEFT">◀</div>
            <div class="btn btn--ok" data-key="OK">OK</div>
            <div class="btn" data-key="RIGHT">▶</div>
            <div class="sp"></div>
            <div class="btn" data-key="DOWN">▼</div>
            <div class="sp"></div>
          </div>

          <div class="col">
            <div class="btn" data-key="CH_UP">CH +</div>
            <div class="btn btn--small btn--flat" data-key="CH_LIST">CH LIST</div>
            <div class="btn" data-key="CH_DOWN">CH −</div>
          </div>
        </div>

        <!-- App / Guide -->
        <div class="apps">
          <div class="btn app--nf" data-key="NETFLIX">NETFLIX</div>
          <div class="btn app--pv" data-key="PRIME_VIDEO">prime video</div>
          <div class="btn app--rk" data-key="RAKUTEN_TV">Rakuten TV</div>
          <div class="btn btn--flat" data-key="GUIDE">GUIDE</div>
        </div>

        <!-- Navegação rápida (grid4 tamanho A/B/C/D) -->
        <div class="grid4">
          <div class="btn btn--flat" data-key="BACK">RETURN</div>
          <div class="btn btn--flat" data-key="PLAY">▶</div>
          <div class="btn btn--flat" data-key="PAUSE">⏸</div>
          <div class="btn btn--flat" data-key="EXIT">EXIT</div>
        </div>

        <!-- Cores A/B/C/D -->
        <div class="colors">
          <div class="btn cA" data-key="A">A</div>
          <div class="btn cB" data-key="B">B</div>
          <div class="btn cC" data-key="C">C</div>
          <div class="btn cD" data-key="D">D</div>
        </div>

        <!-- Settings / Info / AD.SUBT e controlos multimédia -->
        <div class="row">
          <div class="btn btn--small btn--flat" data-key="SETTINGS">SETTINGS</div>
          <div class="btn btn--small btn--flat" data-key="INFO">INFO</div>
          <div class="btn btn--small btn--flat" data-key="AD_SUBT">AD/SUBT.</div>
        </div>
        <div class="grid4">
          <div class="btn btn--flat" data-key="REW">⏪</div>
          <div class="btn btn--flat" data-key="STOP">■</div>
          <div class="btn btn--flat" data-key="PLAY_PAUSE">⏯</div>
          <div class="btn btn--flat" data-key="FF">⏩</div>
        </div>

        <div class="brand">SAMSUNG</div>
        <div class="subtle">(Layout visual inspirado no modelo da foto — pronto para integrar com ESP32)</div>
      </div>
    </div>
  </div>

  <script>
    const DEDUP_MS = 300; // ignora toques repetidos da MESMA tecla neste intervalo
    const lastSent = {};
    const last = document.getElementById('last');
    const remote = document.getElementById('remote');

    function sendKey(key){
      const now = Date.now();
      if(lastSent[key] && (now - lastSent[key]) < DEDUP_MS){ return; }
      lastSent[key] = now;
      last.textContent = 'Última tecla: ' + key + ' @ ' + new Date().toLocaleTimeString();
      console.log('[SamsungRemote]', key);
    }

    // Bloquear seleção/cópia/menu de contexto
    ['contextmenu','selectstart','dragstart','copy','cut','dblclick'].forEach(ev=>{
      remote.addEventListener(ev, e=> e.preventDefault());
    });

    // Press effect com pointer events
    document.querySelectorAll('.btn').forEach(btn=>{
      const key = btn.dataset.key;
      btn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); btn.classList.add('is-pressed'); });
      btn.addEventListener('pointerup',   (e)=>{ e.preventDefault(); btn.classList.remove('is-pressed'); sendKey(key); });
      btn.addEventListener('pointerleave',()=> btn.classList.remove('is-pressed'));
      btn.addEventListener('lostpointercapture', ()=> btn.classList.remove('is-pressed'));
    });
  </script>
</body>
</html>
